<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Fund - LoopGenerator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_catalog.css">
    <link rel="stylesheet" href="style_modal.css">
    <link rel="stylesheet" href="style_modal_extras.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .logo .material-icons { color: #f59e0b; }
        .catalog-header h2 { background: linear-gradient(135deg,#f59e0b,#fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .empty-golden { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; padding:4rem 2rem; color:var(--text-muted); text-align:center; }
        .empty-golden .material-icons { font-size:3rem; color:#f59e0b; opacity:0.4; }
        .empty-golden p { max-width:300px; line-height:1.6; font-size:0.9rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="logo"><span class="material-icons">star</span> Golden Fund</div>
            <div class="header-actions">
                <a href="generate.html" class="btn primary"><span class="material-icons">auto_awesome</span> Generate</a>
                <button id="btn-insert-json" class="btn secondary"><span class="material-icons">data_object</span> Insert JSON</button>
                <a href="catalog.html" class="btn secondary"><span class="material-icons">library_music</span> Catalog</a>
                <a href="index.html" class="btn secondary"><span class="material-icons">arrow_back</span> Editor</a>
            </div>
        </header>
        <main class="main-content catalog-main">
            <div class="catalog-header">
                <div class="header-title-row">
                    <h2>Golden Fund</h2>
                    <div class="header-filters">
                        <div class="search-wrapper">
                            <input type="text" id="search-input" class="search-input" placeholder="Search golden loops...">
                        </div>
                    </div>
                </div>
                <div class="action-bar-content">
                    <div id="progress-container" class="progress-container hidden">
                        <div class="progress-text" id="progress-text">Exporting...</div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
                    </div>
                    <div class="header-eq" id="header-eq">
                        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                    </div>
                    <div class="action-buttons">
                        <button id="btn-delete-selected" class="btn danger" disabled><span class="material-icons">delete</span> Bulk Delete</button>
                        <button id="btn-download-json" class="btn neutral" disabled><span class="material-icons">data_object</span> Download JSON</button>
                        <button id="btn-merge-download" class="btn success" disabled><span class="material-icons">call_merge</span> Merge &amp; Download</button>
                        <button id="btn-download-selected" class="btn primary" disabled><span class="material-icons">archive</span> Download ZIP</button>
                        <button id="btn-export-audio" class="btn accent" disabled><span class="material-icons">audio_file</span> Export Audio</button>
                    </div>
                    <div class="selection-info">
                        <label class="custom-checkbox-wrapper">
                            <input type="checkbox" id="check-all"><span class="checkmark"></span> Select All
                        </label>
                        <span><span id="selected-count">0</span> selected</span>
                    </div>
                </div>
            </div>
            <div id="catalog-list" class="catalog-list"></div>
        </main>
    </div>
    <div id="merge-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header" style="border-bottom:none;padding-bottom:0;">
                <h2>Merge Selected Loops</h2>
                <button id="btn-close-merge-modal" class="modal-close-btn"><span class="material-icons">close</span></button>
            </div>
            <div style="width:100%;height:50px;min-height:50px;max-height:50px;overflow:hidden;margin-top:44px;margin-bottom:1px;position:relative;">
                <div class="header-eq" id="merge-eq" style="position:absolute;top:0;left:0;right:0;bottom:0;justify-content:center;align-items:center;gap:4px;"></div>
            </div>
            <div class="modal-body">
                <div class="merge-track-list" id="merge-track-list"></div>
                <div class="control-group inline merge-bpm-control">
                    <span class="material-icons icon-label">speed</span>
                    <input type="range" id="merge-bpm-slider" min="60" max="240" value="120" class="slider compact-slider" style="flex:1;">
                    <span id="merge-bpm-val" class="val-display">120</span>
                </div>
                <div id="merge-progress-container" class="progress-container hidden" style="margin-top:1rem;">
                    <div class="progress-text" id="merge-progress-text">Rendering Audio...</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="merge-progress-fill"></div></div>
                </div>
                <div class="modal-actions" style="display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;">
                    <button id="btn-merge-preview" class="btn success"><span class="material-icons" id="merge-preview-icon">play_arrow</span> Preview</button>
                    <button id="btn-merge-confirm-download" class="btn primary"><span class="material-icons">download</span> Download</button>
                </div>
            </div>
        </div>
    </div>
    <div id="insert-modal" class="modal hidden">
        <div class="modal-content wide">
            <div class="modal-header">
                <h2>Insert JSON Loops</h2>
                <button id="btn-close-insert" class="modal-close-btn"><span class="material-icons">close</span></button>
            </div>
            <div class="modal-body">
                <p>Paste a JSON <strong>Array</strong> of loop objects to import.</p>
                <textarea id="json-paste-area" class="input-text large-textarea" placeholder="[...]"></textarea>
                <div style="display:flex;justify-content:flex-end;">
                    <button id="btn-import-pasted" class="btn primary"><span class="material-icons">playlist_add</span> Import Array</button>
                </div>
            </div>
        </div>
    </div>
    <div id="toast" class="toast hidden">Message</div>
    <div id="export-overlay" class="export-overlay hidden">
        <div class="export-overlay-card">
            <div class="export-overlay-header"><span class="material-icons">audio_file</span><h3>Exporting Audio</h3></div>
            <div class="export-eq-row" id="export-eq"></div>
            <div class="export-current-track" id="export-current-track">Preparing...</div>
            <div class="export-progress-wrap">
                <div class="export-progress-bar-bg"><div class="export-progress-bar-fill" id="export-progress-fill"></div></div>
                <span class="export-progress-pct" id="export-progress-pct">0%</span>
            </div>
            <div class="export-track-list" id="export-track-list"></div>
            <button id="btn-cancel-export" class="btn danger"><span class="material-icons">close</span> Cancel</button>
        </div>
    </div>
    <script src="golden.js"></script>
</body>
</html>
